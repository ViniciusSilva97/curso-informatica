site_name: Curso de informática
site_description: Curso gratuito de informática, hardware, redes, sistema operacionais e infraestrutura 
site_author: Vinícius Silva

site_url: https://github.com/ViniciusSilva97/curso-informatica
repo_name: ViniciusSilva97/curso-informatica

theme:
  name: material
  language: pt-BR

  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Início: index.md

  - Módulo 1 - Fundamentos da informática:
    - Aula 1 - O que é informática?: modulo-1/aula-1-o-que-e-informatica.md
    - Aula 2 - CPU, RAM, SSD e Placa-mãe: modulo-1/aula-2-cpu-ram-ssd-e-placa-mae.md
    - Aula 3 - Dispositivos de entrada e saída: modulo-1/aula-3-dispositivos-de-entrada-e-saida.md
    - Aula 4 - Sistemas operacionais o maestro do computador: modulo-1/aula-4-sistemas-operacionais-o-maestro-do-computador.md
    - Aula 5 - Windows, Linux, MacOS, Android e IOS. Entendendo as diferenças.: modulo-1/aula-5-windows-linux-macos-android-e-ios-entendendo-as-diferencas.md
    - Aula 6 - Por que um computador fica lento?: modulo-1/aula-6-por-que-um-computador-fica-lento.md
    - Aula 7 - O que acontece quando você liga um computador?: modulo-1/aula-7-o-que-acontence-quando-voce-liga-um-computador.md
    - Aula 8 - Como o computador entende as informações? (Bits, Bytes e dados): modulo-1/aula-8-como-o-computador-entende-as-informacoes.md
    - Aula 9 - Como a internet funciona? A maior rede do mundo: modulo-1/aula-9-como-a-internet-funciona-a-maior-rede-do-mundo.md
    - Aula 10 - Como um site chega até você?: modulo-1/aula-10-como-um-site-chega-ate-voce.md
    - Aula 11 - Como os arquivos são organizados?: modulo-1/aula-11-como-os-arquivos-sao-organizados.md
  - Módulo 2 - Investigação Computacional I: 
    - O método da investigação computacional: modulo-2/aula-1-o-metodo-da-investigacao-computacional.md
    - Aula 2 — Processador. Quem realmente comanda o computador?: modulo-2/aula-2-processador-quem-realmente-comanda-o-computador.md
markdown_extension:
  - admonition
  - attr_list
  - tables
  - toc: 
    permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
    anchor_linenums: true
